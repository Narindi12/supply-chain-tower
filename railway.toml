# railway.toml — Deploy backend to Railway
# Docs: https://docs.railway.app/reference/config-as-code
#
# Setup:
#   1. npm install -g @railway/cli
#   2. railway login
#   3. railway init        (from project root)
#   4. railway up          (deploys backend)
#
# For the frontend, Railway serves static files or use Vercel (see README).

[build]
builder = "NIXPACKS"
buildCommand = "pip install fastapi uvicorn"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
PORT = { default = "8000" }
